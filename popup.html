<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xpert Engage</title>
  <style>
    /* ── Reset & Base ────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1419;
      --surface: #1a1f2e;
      --surface-hover: #252b3b;
      --border: #2a3040;
      --text: #e7e9ee;
      --text-muted: #8b98a5;
      --accent: #1d9bf0;
      --accent-hover: #1a8cd8;
      --success: #00ba7c;
      --warning: #ffad1f;
      --danger: #f4212e;
      --radius: 10px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }
    html { font-size: 14px; }
    body {
      width: 420px;
      min-height: 520px;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
      padding: 16px;
    }

    /* ── Scrollbar ───────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── Layout ──────────────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: -0.3px;
    }
    .logo-icon {
      width: 28px;
      height: 28px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      color: #fff;
    }
    .status-badge {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-weight: 500;
    }
    .status-badge.running { color: var(--success); border-color: var(--success); }
    .status-badge.paused { color: var(--warning); border-color: var(--warning); }

    /* ── Cards / Sections ────────────────────────────────────────── */
    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 12px;
    }
    .section-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* ── Form Elements ───────────────────────────────────────────── */
    label { font-size: 12px; font-weight: 500; color: var(--text-muted); display: block; margin-bottom: 4px; }
    input, textarea, select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-size: 13px;
      font-family: var(--font);
      padding: 9px 12px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, textarea:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 56px; }
    textarea::placeholder, input::placeholder { color: #5c6b7a; }

    .input-group { margin-bottom: 10px; }

    /* ── Toggle Switch ───────────────────────────────────────────── */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .toggle-label { font-size: 13px; font-weight: 500; }
    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
      cursor: pointer;
    }
    .toggle input { display: none; }
    .toggle .slider {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 22px;
      transition: 0.25s;
    }
    .toggle .slider::after {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      left: 2px;
      bottom: 2px;
      background: var(--text);
      border-radius: 50%;
      transition: 0.25s;
    }
    .toggle input:checked + .slider { background: var(--accent); }
    .toggle input:checked + .slider::after { transform: translateX(18px); background: #fff; }

    /* ── Buttons ─────────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 9px 18px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      font-family: var(--font);
      border: none;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-danger:hover:not(:disabled) { background: #d01a26; }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }
    .btn-outline:hover:not(:disabled) { background: var(--surface-hover); }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .btn-group { display: flex; gap: 8px; margin-top: 4px; }

    /* ── Status Log ──────────────────────────────────────────────── */
    .log-area {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 10px 12px;
      height: 130px;
      overflow-y: auto;
      font-size: 12px;
      line-height: 1.6;
      font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
    }
    .log-entry { opacity: 0.9; }
    .log-entry.info { color: var(--accent); }
    .log-entry.success { color: var(--success); }
    .log-entry.warn { color: var(--warning); }
    .log-entry.error { color: var(--danger); }
    .log-entry.muted { color: var(--text-muted); }
    .log-time { color: var(--text-muted); margin-right: 6px; font-size: 11px; }

    /* ── Stats Row ───────────────────────────────────────────────── */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px;
      text-align: center;
    }
    .stat-number {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
    }
    .stat-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* ── Utility ─────────────────────────────────────────────────── */
    .flex { display: flex; }
    .flex-col { flex-direction: column; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .gap-2 { gap: 8px; }
    .mt-2 { margin-top: 8px; }
    .mb-2 { margin-bottom: 8px; }
    .text-muted { color: var(--text-muted); }
    .text-xs { font-size: 11px; }
    .text-sm { font-size: 12px; }
    .w-full { width: 100%; }
  </style>
</head>
<body>

  <!-- ─── Header ─────────────────────────────────────────────── -->
  <div class="header">
    <div class="logo">
      <div class="logo-icon">⟡</div>
      Xpert Engage
    </div>
    <span class="status-badge" id="statusBadge">Idle</span>
  </div>

  <!-- ─── Quick Stats ────────────────────────────────────────── -->
  <div class="stats">
    <div class="stat-card">
      <div class="stat-number" id="statJoined">0</div>
      <div class="stat-label">Joined</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="statPosted">0</div>
      <div class="stat-label">Posted</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="statFollowed">0</div>
      <div class="stat-label">Followed</div>
    </div>
  </div>

  <!-- ─── Auth Token ─────────────────────────────────────────── -->
  <div class="section">
    <div class="section-title">Authentication</div>
    <div class="input-group">
      <label for="authToken">X Auth Token</label>
      <input type="password" id="authToken" placeholder="Paste your auth_token here..." />
    </div>
    <div class="btn-group">
      <button class="btn btn-primary btn-sm w-full" id="btnInjectToken">Inject Token &amp; Authenticate</button>
    </div>
  </div>

  <!-- ─── Community URLs ─────────────────────────────────────── -->
  <div class="section">
    <div class="section-title">Target Communities</div>
    <div class="input-group">
      <label for="communityUrls">Community URLs (one per line)</label>
      <textarea id="communityUrls" placeholder="https://x.com/i/communities/123&#10;https://x.com/i/communities/456" rows="3"></textarea>
    </div>
  </div>

  <!-- ─── Post Content ───────────────────────────────────────── -->
  <div class="section">
    <div class="section-title">Post Content</div>
    <div class="input-group">
      <label for="postContent">Message to post in communities</label>
      <textarea id="postContent" placeholder="Type your post content here..." rows="2"></textarea>
    </div>
  </div>

  <!-- ─── Controls ───────────────────────────────────────────── -->
  <div class="section">
    <div class="section-title">Controls</div>

    <div class="toggle-row mb-2">
      <span class="toggle-label">Auto Follow-Back</span>
      <label class="toggle">
        <input type="checkbox" id="autoFollowToggle" />
        <span class="slider"></span>
      </label>
    </div>

    <div class="btn-group">
      <button class="btn btn-primary w-full" id="btnStart">▶ Start Workflow</button>
      <button class="btn btn-danger w-full" id="btnStop" disabled>■ Stop</button>
    </div>
    <div class="btn-group mt-2">
      <button class="btn btn-outline btn-sm w-full" id="btnClearStats">Reset Stats</button>
      <button class="btn btn-outline btn-sm w-full" id="btnClearLog">Clear Log</button>
    </div>
  </div>

  <!-- ─── Live Status Log ────────────────────────────────────── -->
  <div class="section" style="margin-bottom:0;">
    <div class="section-title">
      Activity Log
      <span class="text-xs text-muted" id="logCount">0 entries</span>
    </div>
    <div class="log-area" id="logArea"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
